<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>OG Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #222;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px;
      gap: 20px;
    }
    #preview {
      width: 1200px;
      height: 630px;
      background: linear-gradient(135deg, #0a0a1a 0%, #0d1b2a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: #fff;
      border: 1px solid #444;
    }
    .container {
      display: flex;
      align-items: center;
      gap: 80px;
      padding: 0 80px;
    }
    .mask-graphic {
      flex-shrink: 0;
    }
    .mask-graphic svg {
      width: 300px;
      height: 300px;
      opacity: 0.85;
    }
    .text {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .title {
      font-size: 52px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
      color: #fff;
    }
    .subtitle {
      font-size: 22px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.6);
      line-height: 1.4;
    }
    .badge {
      display: inline-block;
      margin-top: 8px;
      padding: 8px 18px;
      background: linear-gradient(135deg, #0077b6, #00b4d8);
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      width: fit-content;
      color: #fff;
    }
    #save-btn {
      padding: 12px 32px;
      font-size: 18px;
      font-weight: 600;
      background: #0077b6;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    #save-btn:hover { background: #005f8a; }
    .size-label {
      color: #888;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="size-label">1200 x 630 px</div>
  <div id="preview">
    <div class="container">
      <div class="mask-graphic">
        <svg viewBox="-55 -55 110 110" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <clipPath id="circleClip">
              <circle cx="0" cy="0" r="49" />
            </clipPath>
            <clipPath id="topClip">
              <rect x="-50" y="-50" width="100" height="50" />
            </clipPath>
            <clipPath id="bottomLeftClip">
              <rect x="-50" y="0" width="50" height="50" />
            </clipPath>
            <clipPath id="bottomRightClip">
              <rect x="0" y="0" width="50" height="50" />
            </clipPath>
          </defs>
          <circle cx="0" cy="0" r="50" fill="none" stroke="#00b4d8" stroke-width="2" />
          <circle cx="0" cy="0" r="48" fill="none" stroke="rgba(0,180,216,0.3)" stroke-width="1" />
          <g clip-path="url(#circleClip)">
            <g clip-path="url(#topClip)">
              <line x1="-40" y1="0" x2="-40" y2="-50" stroke="#00b4d8" stroke-width="1.5" opacity="0.7"/>
              <line x1="-32" y1="0" x2="-32" y2="-50" stroke="#00b4d8" stroke-width="1.5" opacity="0.7"/>
              <line x1="-24" y1="0" x2="-24" y2="-50" stroke="#00b4d8" stroke-width="1.5" opacity="0.7"/>
              <line x1="-16" y1="0" x2="-16" y2="-50" stroke="#00b4d8" stroke-width="1.5" opacity="0.7"/>
              <line x1="-8" y1="0" x2="-8" y2="-50" stroke="#00b4d8" stroke-width="1.5" opacity="0.7"/>
              <line x1="0" y1="0" x2="0" y2="-50" stroke="#00b4d8" stroke-width="1.5" opacity="0.7"/>
              <line x1="8" y1="0" x2="8" y2="-50" stroke="#00b4d8" stroke-width="1.5" opacity="0.7"/>
              <line x1="16" y1="0" x2="16" y2="-50" stroke="#00b4d8" stroke-width="1.5" opacity="0.7"/>
              <line x1="24" y1="0" x2="24" y2="-50" stroke="#00b4d8" stroke-width="1.5" opacity="0.7"/>
              <line x1="32" y1="0" x2="32" y2="-50" stroke="#00b4d8" stroke-width="1.5" opacity="0.7"/>
              <line x1="40" y1="0" x2="40" y2="-50" stroke="#00b4d8" stroke-width="1.5" opacity="0.7"/>
            </g>
            <g clip-path="url(#bottomLeftClip)">
              <g transform="rotate(20, 0, 0)">
                <line x1="-40" y1="-50" x2="-40" y2="50" stroke="#00b4d8" stroke-width="1.5" opacity="0.7"/>
                <line x1="-32" y1="-50" x2="-32" y2="50" stroke="#00b4d8" stroke-width="1.5" opacity="0.7"/>
                <line x1="-24" y1="-50" x2="-24" y2="50" stroke="#00b4d8" stroke-width="1.5" opacity="0.7"/>
                <line x1="-16" y1="-50" x2="-16" y2="50" stroke="#00b4d8" stroke-width="1.5" opacity="0.7"/>
                <line x1="-8" y1="-50" x2="-8" y2="50" stroke="#00b4d8" stroke-width="1.5" opacity="0.7"/>
                <line x1="0" y1="-50" x2="0" y2="50" stroke="#00b4d8" stroke-width="1.5" opacity="0.7"/>
                <line x1="8" y1="-50" x2="8" y2="50" stroke="#00b4d8" stroke-width="1.5" opacity="0.7"/>
                <line x1="16" y1="-50" x2="16" y2="50" stroke="#00b4d8" stroke-width="1.5" opacity="0.7"/>
                <line x1="24" y1="-50" x2="24" y2="50" stroke="#00b4d8" stroke-width="1.5" opacity="0.7"/>
                <line x1="32" y1="-50" x2="32" y2="50" stroke="#00b4d8" stroke-width="1.5" opacity="0.7"/>
                <line x1="40" y1="-50" x2="40" y2="50" stroke="#00b4d8" stroke-width="1.5" opacity="0.7"/>
              </g>
            </g>
            <g clip-path="url(#bottomRightClip)">
              <g transform="rotate(-20, 0, 0)">
                <line x1="-40" y1="-50" x2="-40" y2="50" stroke="#00b4d8" stroke-width="1.5" opacity="0.7"/>
                <line x1="-32" y1="-50" x2="-32" y2="50" stroke="#00b4d8" stroke-width="1.5" opacity="0.7"/>
                <line x1="-24" y1="-50" x2="-24" y2="50" stroke="#00b4d8" stroke-width="1.5" opacity="0.7"/>
                <line x1="-16" y1="-50" x2="-16" y2="50" stroke="#00b4d8" stroke-width="1.5" opacity="0.7"/>
                <line x1="-8" y1="-50" x2="-8" y2="50" stroke="#00b4d8" stroke-width="1.5" opacity="0.7"/>
                <line x1="0" y1="-50" x2="0" y2="50" stroke="#00b4d8" stroke-width="1.5" opacity="0.7"/>
                <line x1="8" y1="-50" x2="8" y2="50" stroke="#00b4d8" stroke-width="1.5" opacity="0.7"/>
                <line x1="16" y1="-50" x2="16" y2="50" stroke="#00b4d8" stroke-width="1.5" opacity="0.7"/>
                <line x1="24" y1="-50" x2="24" y2="50" stroke="#00b4d8" stroke-width="1.5" opacity="0.7"/>
                <line x1="32" y1="-50" x2="32" y2="50" stroke="#00b4d8" stroke-width="1.5" opacity="0.7"/>
                <line x1="40" y1="-50" x2="40" y2="50" stroke="#00b4d8" stroke-width="1.5" opacity="0.7"/>
              </g>
            </g>
            <line x1="-50" y1="0" x2="50" y2="0" stroke="#00b4d8" stroke-width="0.5" opacity="0.3"/>
          </g>
        </svg>
      </div>
      <div class="text">
        <div class="title">Bahtinov Mask<br/>Generator</div>
        <div class="subtitle">Free online tool with 3D preview.<br/>Export STL for 3D printing or SVG for laser cutting.</div>
        <div class="badge">Free &mdash; No signup required</div>
      </div>
    </div>
  </div>
  <button id="save-btn" onclick="saveAsPng()">Save as PNG</button>

  <script>
    function saveAsPng() {
      var W = 1200, H = 630;
      var canvas = document.createElement('canvas');
      canvas.width = W;
      canvas.height = H;
      var ctx = canvas.getContext('2d');

      // Background gradient (135deg)
      var grad = ctx.createLinearGradient(0, 0, W, H);
      grad.addColorStop(0, '#0a0a1a');
      grad.addColorStop(1, '#0d1b2a');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);

      // Draw the SVG mask graphic onto canvas via Image
      var svgEl = document.querySelector('.mask-graphic svg');
      var svgData = new XMLSerializer().serializeToString(svgEl);
      var svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
      var url = URL.createObjectURL(svgBlob);

      var img = new Image();
      img.onload = function () {
        // Position: mask at left side, vertically centered
        var svgSize = 300;
        var svgX = 80;
        var svgY = (H - svgSize) / 2;
        ctx.globalAlpha = 0.85;
        ctx.drawImage(img, svgX, svgY, svgSize, svgSize);
        ctx.globalAlpha = 1.0;
        URL.revokeObjectURL(url);

        // Text block starts after SVG + gap
        var textX = svgX + svgSize + 80;
        var textY = svgY + 40;

        // Title: "Bahtinov Mask" / "Generator"
        ctx.fillStyle = '#ffffff';
        ctx.font = '700 52px Inter, system-ui, -apple-system, sans-serif';
        ctx.letterSpacing = '-1px';
        ctx.fillText('Bahtinov Mask', textX, textY + 52);
        ctx.fillText('Generator', textX, textY + 52 + 57);

        // Subtitle
        var subY = textY + 52 + 57 + 32;
        ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
        ctx.font = '400 22px Inter, system-ui, -apple-system, sans-serif';
        ctx.letterSpacing = '0px';
        ctx.fillText('Free online tool with 3D preview.', textX, subY);
        ctx.fillText('Export STL for 3D printing or SVG for laser cutting.', textX, subY + 31);

        // Badge
        var badgeY = subY + 31 + 32;
        var badgeText = 'Free \u2014 No signup required';
        ctx.font = '600 16px Inter, system-ui, -apple-system, sans-serif';
        var badgeW = ctx.measureText(badgeText).width + 36;
        var badgeH = 35;
        var badgeGrad = ctx.createLinearGradient(textX, badgeY, textX + badgeW, badgeY + badgeH);
        badgeGrad.addColorStop(0, '#0077b6');
        badgeGrad.addColorStop(1, '#00b4d8');
        ctx.fillStyle = badgeGrad;
        ctx.beginPath();
        ctx.roundRect(textX, badgeY, badgeW, badgeH, 8);
        ctx.fill();
        ctx.fillStyle = '#ffffff';
        ctx.fillText(badgeText, textX + 18, badgeY + 23);

        // Download
        canvas.toBlob(function (pngBlob) {
          var a = document.createElement('a');
          a.href = URL.createObjectURL(pngBlob);
          a.download = 'og-preview.png';
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(a.href);
        }, 'image/png');
      };
      img.src = url;
    }
  </script>
</body>
</html>
